<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home | Lambda Projects</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2b2b2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/static/logo.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="banner">
    <div class="banner-left">
      <img src="/static/logo.png" alt="Lambda Projects logo">
      <h2>LAMBDA PROJECTS</h2>
    </div>
    <a href="javascript:history.back()" class="back-btn">Back</a>
  </div>

  <h2 style="text-align:center;">Welcome {{name}}</h2>

  <div style="display:flex;justify-content:center;">
    <div class="card" onclick="location.href='/tools'">
      Lambda Project Tools
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</body>
</html>
