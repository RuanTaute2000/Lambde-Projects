<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects | Lambda Projects</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2b2b2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/static/logo.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="banner">
    <div class="banner-left">
      <img src="/static/logo.png" alt="Lambda Projects logo">
      <h2>LAMBDA PROJECTS</h2>
    </div>
    <a href="/home" class="back-btn">Back</a>
  </div>

  {% if role in ["Project Lead", "Workshop Manager"] %}
  <form action="/add_project" method="post" class="center">
    <input name="name" placeholder="Project Name" required>
    <input name="description" placeholder="Short Description">
    <button>Add Project</button>
  </form>
  {% endif %}

  <div class="center" style="margin-top:40px;">
    <input id="project-search" placeholder="Search projects..." oninput="filterProjects()">
  </div>

  <div id="project-grid" style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;">
    {% for project in projects %}
      <div class="card project-card" data-name="{{project.name | lower}}" onclick="location.href='/project/{{project.id}}'">
        <strong>{{project.name}}</strong><br>
        <small>{{project.description}}</small>
      </div>
    {% endfor %}
    {% if not projects %}
      <p style="text-align:center;">No projects yet.</p>
    {% endif %}
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</body>
</html>
